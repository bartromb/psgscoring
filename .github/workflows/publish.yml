name: publish

# ═══════════════════════════════════════════════════════════════════
# SETUP REQUIRED BEFORE FIRST USE:
# ───────────────────────────────────────────────────────────────────
# 1. Go to https://pypi.org/manage/account/publishing/
# 2. Add a new "pending publisher":
#      PyPI Project Name:     psgscoring
#      Owner:                 bartromb
#      Repository name:       psgscoring
#      Workflow name:         publish.yml
#      Environment name:      pypi        (match the environment below)
# 3. Go to repo → Settings → Environments → New environment → "pypi"
#    (no secrets needed; trusted publishing handles auth via OIDC)
#
# After setup, publishing works automatically:
#   → Create a GitHub Release (manually or via our release script)
#   → This workflow builds + uploads to PyPI with no API tokens
#
# Until setup is done, this workflow exists but trusted publishing
# will fail. Either complete the setup or remove this file.
# ═══════════════════════════════════════════════════════════════════

on:
  release:
    types: [published]
  workflow_dispatch:   # allow manual trigger for re-upload

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify version matches tag
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          WHEEL=$(ls dist/*.whl | head -1)
          WHEEL_VER=$(echo "$WHEEL" | sed -E 's/.*psgscoring-([^-]+)-.*/\1/')
          echo "Tag version:   $TAG_VER"
          echo "Wheel version: $WHEEL_VER"
          if [ "$TAG_VER" != "$WHEEL_VER" ]; then
              echo "::error::Tag ($TAG_VER) does not match built wheel ($WHEEL_VER)"
              exit 1
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/psgscoring/
    permissions:
      id-token: write   # required for trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
